<!doctype html>
<html lang="ko">
<head><meta charset="UTF-8"><title>테스트 결제</title></head>
<body>
<input id="at" placeholder="Bearer 없이 AT만 붙여넣기" style="width:520px">
<button id="pay">테스트 결제</button>
<pre id="log" style="white-space:pre-wrap;font-family:monospace;"></pre>

<script src="https://js.tosspayments.com/v1"></script>
<script>
    const LOG=(...a)=>{console.log(...a);document.getElementById('log').textContent+=a.join(' ')+'\n';};
    const clientKey="test_ck_QbgMGZzorzqR7g7KxwMPVl5E1em4";
    const mentosSeq=1, mentosAt="2025-09-08", mentosTime="15:00";

    document.getElementById("pay").onclick = async () => {
      try{
        LOG("click!");
        const token = document.getElementById("at").value.trim(); // ✅ 토큰 입력
        if(!token) return alert("AT 토큰을 입력하세요");

        const r = await fetch("/api/mentos/payments/init", {
          method:"POST",
          headers:{
            "Content-Type":"application/json",
            "Authorization":"Bearer "+token         // ✅ 헤더에 넣기
          },
          body: JSON.stringify({ mentosSeq, mentosAt, mentosTime })
        });

        const raw = await r.text(); LOG("init status:", r.status); LOG("init raw:", raw);
        if(r.status===401) return alert("401: 토큰 없음/만료/불일치");

        const j = JSON.parse(raw);
        const d = j.result ?? j;
        if(!d?.orderId) return alert("orderId 없음");

        await TossPayments(clientKey).requestPayment("CARD", { // ✅ "CARD"
          orderId: d.orderId, amount: d.amount, orderName: d.orderName,
          successUrl: d.successUrl, failUrl: d.failUrl
        });
      }catch(e){
        LOG("requestPayment error:", e?.code||"", e?.message||e);
        alert("결제창 에러: "+(e?.message||e));
      }
    };
</script>
</body>
</html>
